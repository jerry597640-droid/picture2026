<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <title>旅步記帳｜TravelScan</title>
  <style>
    :root { color-scheme: light; --ink:#172033; --muted:#64748b; --brand:#4f46e5; --brand-dark:#3730a3; --line:#e5e7eb; --canvas:#f7f8fc; --card:#fff; --danger:#e11d48; }
    * { box-sizing:border-box; } html { -webkit-text-size-adjust:100%; } body { margin:0; min-width:320px; min-height:100dvh; background:var(--canvas); color:var(--ink); font:15px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif; -webkit-tap-highlight-color:transparent; }
    button,input,select { font:inherit; } button { cursor:pointer; touch-action:manipulation; } button:focus-visible,input:focus-visible,select:focus-visible { outline:3px solid #c7d2fe; outline-offset:2px; }
    .shell { max-width:980px; margin:auto; padding:0 max(18px,env(safe-area-inset-right)) calc(42px + env(safe-area-inset-bottom)) max(18px,env(safe-area-inset-left)); } header { position:sticky; top:0; z-index:20; background:linear-gradient(115deg,#3730a3,#4f46e5 55%,#2563eb); color:#fff; box-shadow:0 2px 15px #312e8140; padding-top:env(safe-area-inset-top); }
    .bar { max-width:980px; margin:auto; min-height:68px; padding:12px 18px; display:flex; align-items:center; justify-content:space-between; gap:14px; } .identity { display:flex; align-items:center; gap:10px; } .mark { width:38px; height:38px; display:grid; place-items:center; border-radius:12px; background:#fff; color:var(--brand); font-size:20px; } h1 { font-size:17px; margin:0; } .tagline { margin:1px 0 0; color:#e0e7ff; font-size:12px; }
    select,.input { border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--ink); padding:9px 11px; } header select { max-width:175px; border-color:#818cf8; background:#3730a3; color:#fff; } .icon-btn,.button { min-height:44px; border:0; border-radius:10px; padding:9px 12px; font-weight:700; transition:.16s ease; } .icon-btn { min-width:44px; background:#ffffff24; color:#fff; font-size:19px; line-height:1; } .button { background:var(--brand); color:#fff; } .button:hover { background:var(--brand-dark); transform:translateY(-1px); } .button.secondary { background:#eef2ff; color:#3730a3; } .button.ghost { background:#fff; color:var(--muted); border:1px solid var(--line); } .button.danger { background:var(--danger); } .top-actions { display:flex; align-items:center; gap:8px; }
    .trip { display:flex; justify-content:space-between; align-items:center; gap:16px; padding:25px 0 18px; } .eyebrow { color:var(--brand); font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; } .trip h2 { font-size:25px; margin:3px 0; } .subtle { color:var(--muted); font-size:13px; }
    .dashboard { display:grid; grid-template-columns:1fr 2fr; gap:15px; } .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:19px; box-shadow:0 2px 4px #0f172a08; } .total { background:linear-gradient(145deg,#0f172a,#334155); color:#fff; } .total .subtle { color:#cbd5e1; } .amount { font-weight:850; font-size:34px; letter-spacing:-.04em; margin:7px 0 18px; } .amount small { color:#a5b4fc; font-size:15px; letter-spacing:0; margin-right:5px; } h3 { font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 14px; } .category-row { display:grid; grid-template-columns:92px 1fr auto; gap:10px; align-items:center; margin:9px 0; font-size:13px; } .progress { height:8px; overflow:hidden; border-radius:99px; background:#eef2ff; }.progress i { display:block; height:100%; border-radius:inherit; background:linear-gradient(90deg,#6366f1,#38bdf8); }
    .quick { display:flex; gap:12px; margin:20px 0; } .quick .button,.quick label.button { flex:1; padding:14px; font-size:16px; text-align:center; }.quick .secondary { border:1px solid #c7d2fe; }.toolbar { display:flex; gap:10px; align-items:center; margin:18px 0; } .search { flex:1; min-width:0; } .filters { display:flex; gap:7px; overflow:auto; padding-bottom:2px; } .pill { white-space:nowrap; border:1px solid var(--line); background:#fff; color:var(--muted); border-radius:99px; padding:7px 11px; font-size:13px; }.pill.active { background:#eef2ff; border-color:#a5b4fc; color:#3730a3; font-weight:750; }
    .list { display:grid; gap:10px; }.expense { width:100%; display:grid; grid-template-columns:auto 1fr auto; gap:12px; text-align:left; align-items:center; border:1px solid var(--line); border-radius:15px; padding:13px; background:#fff; color:inherit; }.expense:hover { border-color:#a5b4fc; box-shadow:0 4px 14px #4f46e515; }.emoji { width:40px; height:40px; display:grid; place-items:center; border-radius:12px; background:#f1f5f9; font-size:20px; }.expense strong { display:block; }.expense .meta { color:var(--muted); font-size:12px; margin-top:2px; }.expense .sum { text-align:right; font-weight:800; }.empty { color:var(--muted); text-align:center; padding:42px 15px; border:1px dashed #cbd5e1; border-radius:16px; background:#fff; }
    dialog { max-width:min(520px,calc(100% - 28px)); width:100%; border:0; padding:0; border-radius:19px; box-shadow:0 20px 60px #0f172a50; } dialog::backdrop { background:#0f172a85; backdrop-filter:blur(3px); }.modal-head { padding:17px 20px; color:#fff; background:linear-gradient(115deg,#4338ca,#2563eb); display:flex; align-items:center; justify-content:space-between; }.modal-head h2 { font-size:17px; margin:0; }.modal-body { padding:20px; }.fields { display:grid; gap:14px; }.two { grid-template-columns:1fr 1fr; gap:12px; }.field { display:grid; gap:5px; font-size:13px; color:#475569; font-weight:700; }.field input,.field select { width:100%; }.modal-actions { display:flex; justify-content:flex-end; gap:9px; padding:0 20px 20px; }.detail-total { font-size:30px; font-weight:850; text-align:center; padding:12px; border-bottom:1px solid var(--line); }.details { display:grid; gap:9px; padding:18px 0; }.details div { display:flex; justify-content:space-between; gap:14px; }.details span { color:var(--muted); }.receipt-items { margin:12px 0; padding:12px; border:1px solid #e0e7ff; border-radius:12px; background:#f8faff; }.receipt-items h4 { margin:0 0 8px; color:#475569; font-size:12px; }.receipt-items ul { list-style:none; margin:0; padding:0; display:grid; gap:6px; }.receipt-items li { display:flex; justify-content:space-between; gap:12px; color:#334155; font-size:13px; }.receipt-items li span:last-child { white-space:nowrap; font-weight:800; }.expense-items { margin-top:7px; display:grid; gap:3px; }.expense-items div { display:flex; justify-content:space-between; gap:8px; color:#64748b; font-size:12px; }.footer-actions { display:flex; gap:9px; }.footer-actions .button { flex:1; }.scan-note { font-size:13px; color:var(--muted); margin:0 0 13px; }.scan-status { display:none; color:#3730a3; background:#eef2ff; border-radius:10px; padding:10px; font-weight:700; font-size:13px; }.scan-status.show { display:block; }.sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
    @media (max-width:650px) { input,select { font-size:16px; } .bar,.trip { align-items:flex-start; }.bar { min-height:62px; }.tagline { display:none; }.trip { flex-direction:column; padding:20px 0 14px; }.dashboard { grid-template-columns:1fr; }.toolbar { flex-direction:column; align-items:stretch; }.quick { flex-direction:column; }.top-actions { flex-shrink:0; } header select { width:120px; }.two { grid-template-columns:1fr; }.category-row { grid-template-columns:75px 1fr auto; } dialog { max-width:calc(100% - 20px); max-height:calc(100dvh - 20px); overflow:auto; } .expense { min-height:68px; } }
    @media (min-width:651px) and (max-width:1024px) { .shell,.bar { max-width:760px; } .quick { display:grid; grid-template-columns:1.3fr 1fr 1fr; } }
  </style>
</head>
<body>
  <header><div class="bar"><div class="identity"><div class="mark">✦</div><div><h1>旅步記帳</h1><p class="tagline">拍下每一筆，旅程更自在</p></div></div><div class="top-actions"><select id="tripSelect" aria-label="選擇行程"></select><button class="icon-btn" id="apiSettings" aria-label="OCR 設定">⚙</button><button class="icon-btn" id="newTrip" aria-label="新增行程">＋</button></div></div></header>
  <main class="shell">
    <section class="trip"><div><div class="eyebrow" id="tripDate">尚未設定日期</div><h2 id="tripName">我的旅程</h2><div class="subtle" id="tripInfo">以本機儲存，資料只留在此裝置</div></div><div class="top-actions"><button class="button ghost" id="csv">匯出 CSV</button><button class="button ghost" id="json">備份 JSON</button></div></section>
    <section class="dashboard"><article class="card total"><h3>本次旅程支出</h3><div class="amount"><small id="currency">TWD</small><span id="total">0</span></div><div class="subtle">共 <b id="count">0</b> 筆記錄</div></article><article class="card"><h3>類別分布</h3><div id="categories"></div></article></section>
    <section class="quick"><label class="button" for="receiptImage">⌁ 拍照辨識收據</label><input class="sr-only" id="receiptImage" type="file" accept="image/*" capture="environment"><button class="button secondary" id="addExpense">＋ 手動新增</button><button class="button secondary" id="newTrip2">＋ 建立新行程</button></section>
    <section class="toolbar"><label class="sr-only" for="search">搜尋支出</label><input class="input search" id="search" type="search" placeholder="搜尋店家、日期或項目…"><div class="filters" id="filters"></div></section>
    <section><h3>支出明細</h3><div class="list" id="expenses"></div></section>
  </main>
  <dialog id="tripDialog"><form method="dialog" id="tripForm"><div class="modal-head"><h2>建立新行程</h2><button class="icon-btn" value="cancel" aria-label="關閉">×</button></div><div class="modal-body fields"><label class="field">行程名稱<input required name="name" maxlength="50" placeholder="例如：東京七日遊"></label><div class="two"><label class="field">幣別<select name="currency"><option>TWD</option><option>JPY</option><option>USD</option><option>EUR</option><option>KRW</option></select></label><label class="field">開始日期<input type="date" name="start"></label></div><label class="field">結束日期<input type="date" name="end"></label></div><div class="modal-actions"><button class="button ghost" value="cancel">取消</button><button class="button" value="default">建立行程</button></div></form></dialog>
  <dialog id="expenseDialog"><form method="dialog" id="expenseForm"><div class="modal-head"><h2>新增支出</h2><button class="icon-btn" value="cancel" aria-label="關閉">×</button></div><div class="modal-body fields"><label class="field">店家或項目<input required name="name" maxlength="80" placeholder="例如：拉麵店"></label><div class="two"><label class="field">金額<input required name="amount" min="0" step="0.01" inputmode="decimal" type="number" placeholder="0"></label><label class="field">類別<select name="category"></select></label></div><label class="field">日期<input type="date" name="date"></label><label class="field">備註（選填）<input name="note" maxlength="120" placeholder="品項、同行者等"></label></div><div class="modal-actions"><button class="button ghost" value="cancel">取消</button><button class="button" value="default">儲存支出</button></div></form></dialog>
  <dialog id="scanDialog"><div class="modal-head"><h2>收據 OCR 辨識</h2><button class="icon-btn" id="closeScan" aria-label="關閉">×</button></div><div class="modal-body"><p class="scan-note">圖片會在你按下「開始辨識」後才傳送到 Gemini。請先確認欄位再儲存。</p><img id="scanPreview" alt="待辨識收據預覽" style="display:none;width:100%;max-height:220px;object-fit:contain;border-radius:12px;background:#f1f5f9;margin-bottom:14px"><div id="scanStatus" class="scan-status">正在讀取收據…</div><div class="fields"><label class="field">店家或項目<input id="scanName" maxlength="80"></label><div class="two"><label class="field">金額<input id="scanAmount" min="0" step="0.01" inputmode="decimal" type="number"></label><label class="field">類別<select id="scanCategory"></select></label></div><label class="field">日期<input id="scanDate" type="date"></label><label class="field">辨識文字／備註<input id="scanNote" maxlength="120"></label><div id="scanItems" class="receipt-items" hidden></div></div></div><div class="modal-actions"><button class="button ghost" id="scanManual">手動填寫</button><button class="button" id="scanSave">確認儲存</button></div></dialog>
  <dialog id="apiDialog"><form method="dialog" id="apiForm"><div class="modal-head"><h2>OCR 設定</h2><button class="icon-btn" value="cancel" aria-label="關閉">×</button></div><div class="modal-body fields"><p class="scan-note">使用 Gemini Vision 辨識收據。金鑰只儲存在這台裝置的瀏覽器中；正式上線建議改由後端安全代理。</p><a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" class="button secondary" style="display:block;text-decoration:none">↗ 建立 Gemini API Key</a><label class="field">Gemini API Key<input name="key" type="password" autocomplete="off" placeholder="AIza…"></label><label class="field">模型<input name="model" value="gemini-2.5-flash" autocomplete="off"></label></div><div class="modal-actions"><button class="button ghost" value="cancel">取消</button><button class="button" value="default">儲存設定</button></div></form></dialog>
  <dialog id="detailDialog"><div class="modal-head"><h2 id="detailTitle">支出詳情</h2><button class="icon-btn" id="closeDetail" aria-label="關閉">×</button></div><div class="modal-body"><img id="detailPhoto" alt="收據照片" style="display:none;width:100%;max-height:280px;object-fit:contain;border-radius:12px;background:#f1f5f9;margin-bottom:14px"><div class="detail-total"><small id="detailCurrency"></small> <span id="detailAmount"></span></div><div class="details"><div><span>類別</span><b id="detailCategory"></b></div><div><span>日期</span><b id="detailDate"></b></div><div><span>備註</span><b id="detailNote">—</b></div></div><div id="detailItems" class="receipt-items" hidden></div><div class="footer-actions"><button class="button ghost" id="detailClose">關閉</button><button class="button danger" id="deleteExpense">刪除這筆</button></div></div></dialog>
  <script>
    const KEY='travel-scan-v2'; const categories={餐飲:'🍜',交通:'🚆',住宿:'🏨',購物:'🛍️',景點:'🎟️',其他:'📦'}; let state=load(); let selected='全部'; let openId=null; let pendingReceipt=null; let pendingItems=[];
    function load(){try{const s=JSON.parse(localStorage.getItem(KEY)); if(s?.trips?.length)return s}catch{} return {active:'demo',trips:[{id:'demo',name:'我的旅程',currency:'TWD',start:'',end:'',expenses:[]}]}}
    function save(){localStorage.setItem(KEY,JSON.stringify(state))} function trip(){return state.trips.find(x=>x.id===state.active)||state.trips[0]} function money(n){return new Intl.NumberFormat('zh-TW',{maximumFractionDigits:2}).format(n)} function esc(v){return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
    const $=s=>document.querySelector(s); const photoDb=new Promise((resolve,reject)=>{const request=indexedDB.open('travel-scan-photos',1);request.onupgradeneeded=()=>request.result.createObjectStore('receipts');request.onsuccess=()=>resolve(request.result);request.onerror=()=>reject(request.error)}); function savePhoto(id,data){return photoDb.then(db=>new Promise((resolve,reject)=>{const tx=db.transaction('receipts','readwrite');tx.objectStore('receipts').put(data,id);tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)}))} function getPhoto(id){return id?photoDb.then(db=>new Promise((resolve,reject)=>{const request=db.transaction('receipts').objectStore('receipts').get(id);request.onsuccess=()=>resolve(request.result);request.onerror=()=>reject(request.error)})):Promise.resolve(null)} function deletePhoto(id){return id?photoDb.then(db=>new Promise((resolve,reject)=>{const tx=db.transaction('receipts','readwrite');tx.objectStore('receipts').delete(id);tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error)})):Promise.resolve()} function dates(t){return t.start||t.end?[t.start||'未定',t.end||'未定'].join(' — '):'尚未設定日期'}
    function render(){const t=trip(), all=t.expenses, q=$('#search').value.trim().toLowerCase(); $('#tripSelect').innerHTML=state.trips.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join(''); $('#tripSelect').value=t.id; $('#tripName').textContent=t.name; $('#tripDate').textContent=dates(t); $('#currency').textContent=t.currency; $('#count').textContent=all.length; $('#total').textContent=money(all.reduce((a,x)=>a+x.amount,0));
      $('#filters').innerHTML=['全部',...Object.keys(categories)].map(c=>`<button class="pill ${c===selected?'active':''}" data-filter="${c}">${c==='全部'?'全部':categories[c]+' '+c}</button>`).join(''); const totals=Object.fromEntries(Object.keys(categories).map(c=>[c,all.filter(x=>x.category===c).reduce((n,x)=>n+x.amount,0)])), max=Math.max(1,...Object.values(totals)); $('#categories').innerHTML=all.length?Object.entries(totals).filter(([,n])=>n).map(([c,n])=>`<div class="category-row"><span>${categories[c]} ${c}</span><div class="progress"><i style="width:${n/max*100}%"></i></div><b>${money(n)}</b></div>`).join(''):'<p class="subtle">新增支出後，這裡會顯示類別分布。</p>';
      const list=all.filter(x=>(selected==='全部'||x.category===selected)&&(`${x.name} ${x.note} ${x.date}`).toLowerCase().includes(q)).sort((a,b)=>b.date.localeCompare(a.date)); $('#expenses').innerHTML=list.length?list.map(x=>`<button class="expense" data-id="${x.id}"><span class="emoji">${categories[x.category]}</span><span><strong>${esc(x.name)}</strong><span class="meta">${x.date}${x.note?' · '+esc(x.note):''}</span></span><span class="sum">${t.currency} ${money(x.amount)}</span></button>`).join(''):'<div class="empty">還沒有符合的支出。<br>從上方「新增支出」開始記錄吧。</div>'; save(); }
    function open(dialog){dialog.showModal()} function download(name,text,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),400)}
    function markPossibleDuplicates(){const groups=new Map();for(const item of trip().expenses){const name=item.name.trim().replace(/\s+/g,' ').toLocaleLowerCase('zh-TW');const key=`${name}|${item.amount}|${item.date}`;groups.set(key,[...(groups.get(key)||[]),item.id])}for(const ids of groups.values()){if(ids.length<2)continue;for(const id of ids){const card=document.querySelector(`[data-id="${id}"]`);if(!card||card.querySelector('.duplicate-badge'))continue;const badge=document.createElement('span');badge.className='duplicate-badge';badge.textContent='⚠ 可能重複';badge.title='同一行程中有相同店家、金額與日期的記錄';badge.style.cssText='display:inline-block;margin-left:6px;padding:2px 6px;border-radius:999px;background:#fff7ed;color:#c2410c;font-size:11px;font-weight:800;vertical-align:middle';card.querySelector('.meta')?.append(badge)}}}
    async function loadPhotoPreviews(){for(const item of trip().expenses){if(!item.photoId)continue;const card=document.querySelector(`[data-id="${item.id}"]`);if(!card||card.querySelector('.receipt-photo'))continue;try{const data=await getPhoto(item.photoId);if(!data)continue;const image=document.createElement('img');image.className='receipt-photo';image.src=data;image.alt='收據';image.style.cssText='width:40px;height:40px;object-fit:cover;border-radius:12px';card.querySelector('.emoji')?.replaceChildren(image)}catch{}}}
    function loadItemPreviews(){for(const item of trip().expenses){if(!item.items?.length)continue;const card=document.querySelector(`[data-id="${item.id}"]`);const target=card?.querySelector('.meta')?.parentElement;if(!target||target.querySelector('.expense-items'))continue;const box=document.createElement('div');renderItemList(box,item.items,trip().currency,true);target.append(box.firstChild)}}
    new MutationObserver(()=>{markPossibleDuplicates();loadPhotoPreviews();loadItemPreviews()}).observe($('#expenses'),{childList:true});
    $('#newTrip').onclick=$('#newTrip2').onclick=()=>open($('#tripDialog')); $('#addExpense').onclick=()=>{const f=$('#expenseForm'); f.reset(); f.date.value=new Date().toISOString().slice(0,10); f.category.innerHTML=Object.keys(categories).map(c=>`<option>${c}</option>`).join('');open($('#expenseDialog'))}; $('#tripSelect').onchange=e=>{state.active=e.target.value;selected='全部';render()}; $('#search').oninput=render; $('#filters').onclick=e=>{if(e.target.dataset.filter){selected=e.target.dataset.filter;render()}};
    $('#tripForm').onsubmit=e=>{if(e.submitter.value==='cancel')return; const d=new FormData(e.target),id=crypto.randomUUID();state.trips.push({id,name:d.get('name').trim(),currency:d.get('currency'),start:d.get('start'),end:d.get('end'),expenses:[]});state.active=id;render()};
    $('#expenseForm').onsubmit=e=>{if(e.submitter.value==='cancel')return;const d=new FormData(e.target), amount=Number(d.get('amount'));if(!Number.isFinite(amount)||amount<0){e.preventDefault();return alert('請輸入有效金額。')} trip().expenses.push({id:crypto.randomUUID(),name:d.get('name').trim(),amount,category:d.get('category'),date:d.get('date'),note:d.get('note').trim()});render()};
    $('#expenses').onclick=async e=>{const b=e.target.closest('[data-id]');if(!b)return;openId=b.dataset.id;const x=trip().expenses.find(v=>v.id===openId);$('#detailTitle').textContent=x.name;$('#detailCurrency').textContent=trip().currency;$('#detailAmount').textContent=money(x.amount);$('#detailCategory').textContent=categories[x.category]+' '+x.category;$('#detailDate').textContent=x.date;$('#detailNote').textContent=x.note||'—';renderItemList($('#detailItems'),x.items,trip().currency);const photo=$('#detailPhoto');photo.style.display='none';photo.removeAttribute('src');open($('#detailDialog'));try{const data=await getPhoto(x.photoId);if(data){photo.src=data;photo.style.display='block'}}catch{}}; $('#closeDetail').onclick=$('#detailClose').onclick=()=>$('#detailDialog').close(); $('#deleteExpense').onclick=async()=>{if(confirm('確定要刪除這筆支出嗎？')){const item=trip().expenses.find(x=>x.id===openId);trip().expenses=trip().expenses.filter(x=>x.id!==openId);try{await deletePhoto(item?.photoId)}catch{}$('#detailDialog').close();render()}};
    function imageData(file){return new Promise((resolve,reject)=>{const r=new FileReader();r.onerror=reject;r.onload=()=>{const img=new Image();img.onerror=reject;img.onload=()=>{const max=1600,ratio=Math.min(1,max/Math.max(img.width,img.height)),c=document.createElement('canvas');c.width=Math.round(img.width*ratio);c.height=Math.round(img.height*ratio);c.getContext('2d').drawImage(img,0,0,c.width,c.height);const data=c.toDataURL('image/jpeg',.85);resolve({preview:data,mime:'image/jpeg',base64:data.split(',')[1]})};img.src=r.result};r.readAsDataURL(file)})}
    function jsonFrom(text){const match=text.match(/\{[\s\S]*\}/);if(!match)throw new Error('辨識結果格式不正確');return JSON.parse(match[0])}
    function validItems(items){return Array.isArray(items)?items.map(item=>({name:String(item?.name||'').trim(),amount:Number(item?.amount)})).filter(item=>item.name&&Number.isFinite(item.amount)&&item.amount>=0):[]} function renderItemList(container,items,currency,compact=false){container.replaceChildren();if(!items?.length){container.hidden=true;return}container.hidden=false;if(!compact){const title=document.createElement('h4');title.textContent='收據品項';container.append(title)}const list=document.createElement(compact?'div':'ul');if(compact)list.className='expense-items';for(const item of items){const row=document.createElement(compact?'div':'li'),name=document.createElement('span'),amount=document.createElement('span');name.textContent=item.name;amount.textContent=`${currency} ${money(item.amount)}`;row.append(name,amount);list.append(row)}container.append(list)}
    async function recogniseReceipt(file){const cfg=state.ocr||{};if(!cfg.key){$('#apiForm').elements.key.value='';$('#apiForm').elements.model.value=cfg.model||'gemini-2.5-flash';open($('#apiDialog'));return} const data=await imageData(file);pendingReceipt=data;pendingItems=[];$('#scanPreview').src=data.preview;$('#scanPreview').style.display='block';$('#scanName').value='';$('#scanAmount').value='';$('#scanDate').value='';$('#scanNote').value='';renderItemList($('#scanItems'),[],trip().currency);$('#scanCategory').innerHTML=Object.keys(categories).map(c=>`<option>${c}</option>`).join('');$('#scanStatus').textContent='正在辨識收據…';$('#scanStatus').classList.add('show');open($('#scanDialog'));try{const prompt=`Read this receipt. Return only JSON: {"name":"merchant or short purchase name","amount":number,"date":"YYYY-MM-DD or empty","category":"餐飲|交通|住宿|購物|景點|其他","note":"short useful receipt text","items":[{"name":"item name","amount":number}]}. Use the receipt's final amount for amount. Extract every readable purchased item and its line amount in items. If uncertain use empty values or an empty items array; never invent.`;const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(cfg.model||'gemini-2.5-flash')}:generateContent?key=${encodeURIComponent(cfg.key)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:data.mime,data:data.base64}}]}],generationConfig:{temperature:0,responseMimeType:'application/json'}})});const body=await res.json();if(!res.ok)throw new Error(body.error?.message||'Gemini 無法辨識這張圖片');const result=jsonFrom(body.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'');$('#scanName').value=result.name||'';$('#scanAmount').value=Number.isFinite(Number(result.amount))?result.amount:'';$('#scanDate').value=/^\d{4}-\d{2}-\d{2}$/.test(result.date||'')?result.date:'';$('#scanCategory').value=categories[result.category]?result.category:'其他';$('#scanNote').value=result.note||'';pendingItems=validItems(result.items);renderItemList($('#scanItems'),pendingItems,trip().currency);$('#scanStatus').textContent='辨識完成，請核對後儲存。'}catch(err){$('#scanStatus').textContent=`辨識失敗：${err.message}。你仍可手動填寫。`} }
    $('#apiSettings').onclick=()=>{const cfg=state.ocr||{};$('#apiForm').elements.key.value=cfg.key||'';$('#apiForm').elements.model.value=cfg.model||'gemini-2.5-flash';open($('#apiDialog'))};$('#apiForm').onsubmit=e=>{if(e.submitter.value==='cancel')return;const d=new FormData(e.target);state.ocr={key:d.get('key').trim(),model:d.get('model').trim()||'gemini-2.5-flash'};save()};$('#receiptImage').onchange=async e=>{const file=e.target.files[0];e.target.value='';if(!file)return;try{await recogniseReceipt(file)}catch(err){alert(`無法讀取圖片：${err.message}`)}};$('#closeScan').onclick=()=>$('#scanDialog').close();$('#scanManual').onclick=()=>{$('#scanStatus').classList.remove('show');$('#scanName').focus()};$('#scanSave').onclick=async()=>{const amount=Number($('#scanAmount').value);if(!$('#scanName').value.trim()||!Number.isFinite(amount)||amount<0)return alert('請確認店家名稱與金額。');let photoId='';if(pendingReceipt?.preview){photoId=crypto.randomUUID();try{await savePhoto(photoId,pendingReceipt.preview)}catch(error){photoId='';alert('收據照片無法保存，但仍會儲存這筆支出。')}}trip().expenses.push({id:crypto.randomUUID(),name:$('#scanName').value.trim(),amount,category:$('#scanCategory').value,date:$('#scanDate').value||new Date().toISOString().slice(0,10),note:$('#scanNote').value.trim(),photoId,items:pendingItems});pendingReceipt=null;pendingItems=[];$('#scanDialog').close();render()};
    $('#csv').onclick=()=>{const t=trip(), rows=[['日期','店家或項目','類別','金額','幣別','備註'],...t.expenses.map(x=>[x.date,x.name,x.category,x.amount,t.currency,x.note])];download(`${t.name}-expenses.csv`,'\ufeff'+rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n'),'text/csv;charset=utf-8')}; $('#json').onclick=()=>download('travel-scan-backup.json',JSON.stringify(state,null,2),'application/json'); render();
  </script>
